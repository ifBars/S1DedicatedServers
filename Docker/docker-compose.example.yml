services:
  s1ds:
    image: ${S1DS_IMAGE:-ghcr.io/ifbars/s1dedicatedservers:latest}
    # Set S1DS_IMAGE in .env when you want to pin a specific release tag.
    # Set S1DS_RUNTIME in .env to mono or il2cpp. When STEAM_BRANCH is blank, the
    # container automatically selects the expected game branch for that runtime.
    # To build locally from Docker.zip instead of pulling from GHCR, replace the
    # image line above with the build block below and run `docker compose up -d --build`.
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: s1ds
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "38465:38465/udp"
      - "38465:38465/tcp"
      - "27016:27016/udp"
    volumes:
      - s1ds_game:/home/steam/game
      - s1ds_steamcmd:/home/steam/steamcmd
      - s1ds_steam_home:/home/steam/Steam

volumes:
  s1ds_game:
  s1ds_steamcmd:
  s1ds_steam_home:
