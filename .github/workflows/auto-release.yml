name: Auto Release on Version Change

on:
  push:
    branches:
      - main
      - master
    paths:
      - "API/Version.cs"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (leave empty to use API/Version.cs)"
        required: false
        type: string
      assembly_branch:
        description: "Assembly branch to use (main/master or beta)"
        required: false
        default: "main"
        type: choice
        options:
          - main
          - master
          - beta

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.check.outputs.changed }}
      new-version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}
      make-latest: ${{ steps.check.outputs.make_latest }}
      release-name: ${{ steps.check.outputs.release_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check if version needs release
        id: check
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ -n "${{ inputs.version }}" ]]; then
            current_version="${{ inputs.version }}"
            echo "Manual trigger with version: $current_version"
          else
            current_version=$(grep -oP 'public const string ModVersion = "\K[^"]+' API/Version.cs | head -n 1)
            if [[ -z "$current_version" ]]; then
              echo "Failed to determine version from API/Version.cs" >&2
              exit 1
            fi
            echo "Current version from API/Version.cs: $current_version"
          fi

          if git rev-parse "v$current_version" >/dev/null 2>&1; then
            echo "Tag v$current_version already exists, skipping release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v$current_version does not exist, creating release"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$current_version" >> "$GITHUB_OUTPUT"

          echo "release_name=DedicatedServerMod v$current_version" >> "$GITHUB_OUTPUT"

          if [[ "$current_version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout DedicatedServerMod
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine Assembly Branch
        id: assembly-branch
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ -n "${{ inputs.assembly_branch }}" ]]; then
            requested_branch="${{ inputs.assembly_branch }}"
          else
            requested_branch="master"
          fi

          case "$requested_branch" in
            main|master|beta)
              ;;
            *)
              echo "Unsupported assembly branch: $requested_branch"
              exit 1
              ;;
          esac

          if [[ "$requested_branch" == "beta" ]]; then
            mono_branch="beta"
            il2cpp_branch="beta"
          else
            mono_branch="main"
            il2cpp_branch="main"
          fi

          echo "mono_branch=$mono_branch" >> "$GITHUB_OUTPUT"
          echo "il2cpp_branch=$il2cpp_branch" >> "$GITHUB_OUTPUT"
          echo "Using Mono assemblies from $mono_branch and IL2CPP assemblies from $il2cpp_branch (requested: $requested_branch)"

      - name: Checkout Mono Game Assemblies
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GAME_ASSEMBLIES_REPO }}
          token: ${{ secrets.GAME_ASSEMBLIES_TOKEN }}
          ref: ${{ steps.assembly-branch.outputs.mono_branch }}
          path: game-assemblies
          fetch-depth: 1

      - name: Checkout IL2CPP Game Assemblies
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.IL2CPP_ASSEMBLIES_REPO }}
          token: ${{ secrets.IL2CPP_ASSEMBLIES_TOKEN }}
          ref: ${{ steps.assembly-branch.outputs.il2cpp_branch }}
          path: il2cpp-assemblies
          fetch-depth: 1

      - name: Verify Mono Assemblies
        shell: bash
        run: |
          set -euo pipefail

          test -f "game-assemblies/Managed/Assembly-CSharp.dll"
          test -f "game-assemblies/MelonLoader/MelonLoader.dll"

      - name: Verify IL2CPP Assemblies
        shell: bash
        run: |
          set -euo pipefail

          il2cppAssembliesSource=""
          if [ -d "il2cpp-assemblies/MelonLoader/Il2CppAssemblies" ]; then
            il2cppAssembliesSource="il2cpp-assemblies/MelonLoader/Il2CppAssemblies"
          elif [ -d "il2cpp-assemblies/Il2CppAssemblies" ]; then
            il2cppAssembliesSource="il2cpp-assemblies/Il2CppAssemblies"
          fi

          if [ -z "$il2cppAssembliesSource" ]; then
            echo "IL2CPP assemblies directory not found in il2cpp-assemblies checkout" >&2
            exit 1
          fi

          il2cppNet6Source=""
          if [ -d "il2cpp-assemblies/MelonLoader/net6" ]; then
            il2cppNet6Source="il2cpp-assemblies/MelonLoader/net6"
          elif [ -d "il2cpp-assemblies/net6" ]; then
            il2cppNet6Source="il2cpp-assemblies/net6"
          fi

          if [ -z "$il2cppNet6Source" ]; then
            echo "IL2CPP net6 directory not found in il2cpp-assemblies checkout" >&2
            exit 1
          fi

          test -f "$il2cppAssembliesSource/Assembly-CSharp.dll"
          test -f "$il2cppNet6Source/MelonLoader.dll"

      - name: Create Mono CI Build Properties
        shell: bash
        run: |
          cat > ci.build.props << 'EOF'
          <Project>
              <PropertyGroup>
                  <AutomateLocalDeployment>false</AutomateLocalDeployment>
                  <MelonLoaderAssembliesPath>$(MSBuildThisFileDirectory)game-assemblies/MelonLoader</MelonLoaderAssembliesPath>
                  <MonoAssembliesPath>$(MSBuildThisFileDirectory)game-assemblies/Managed</MonoAssembliesPath>
              </PropertyGroup>
          </Project>
          EOF

      - name: Restore Mono Dependencies
        run: dotnet restore DedicatedServerMod.csproj -p:EffectiveConfiguration=Mono_Server

      - name: Build Mono Server
        run: dotnet build DedicatedServerMod.csproj --no-restore -c Mono_Server -v minimal

      - name: Build Mono Client
        run: dotnet build DedicatedServerMod.csproj --no-restore -c Mono_Client -v minimal

      - name: Create IL2CPP CI Build Properties
        shell: bash
        run: |
          cat > ci.build.props << 'EOF'
          <Project>
              <PropertyGroup>
                  <AutomateLocalDeployment>false</AutomateLocalDeployment>
                  <Il2CppGamePath>$(MSBuildThisFileDirectory)il2cpp-assemblies</Il2CppGamePath>
              </PropertyGroup>
          </Project>
          EOF

      - name: Disable Publicizer For IL2CPP
        shell: bash
        run: |
          cat > Directory.Build.targets << 'EOF'
          <Project>
              <ItemGroup Condition="'$(EffectiveConfiguration)'=='Il2cpp_Client' Or '$(EffectiveConfiguration)'=='Il2cpp_Server'">
                  <Publicize Remove="Assembly-CSharp" />
              </ItemGroup>
          </Project>
          EOF

      - name: Remove Mono Assembly Trees Before IL2CPP Build
        shell: bash
        run: |
          rm -rf game-assemblies ScheduleOneAssemblies

      - name: Reset IL2CPP Restore State
        shell: bash
        run: |
          rm -rf obj/Il2cpp_Server obj/Il2cpp_Client
          rm -f obj/project.assets.json obj/*.nuget.g.props obj/*.nuget.g.targets

      - name: Restore IL2CPP Dependencies
        run: dotnet restore DedicatedServerMod.csproj -p:EffectiveConfiguration=Il2cpp_Server

      - name: Build IL2CPP Server
        run: dotnet build DedicatedServerMod.csproj --no-restore -c Il2cpp_Server -v minimal

      - name: Build IL2CPP Client
        run: dotnet build DedicatedServerMod.csproj --no-restore -c Il2cpp_Client -v minimal

      - name: Remove Temporary IL2CPP Build Targets
        if: always()
        shell: bash
        run: rm -f Directory.Build.targets

      - name: Prepare Release Packages
        shell: pwsh
        run: |
          $releaseRoot = Join-Path $PWD 'release'
          $serverRoot = Join-Path $releaseRoot 'Server'
          $clientRoot = Join-Path $releaseRoot 'Client'
          $il2cppServerRoot = Join-Path $releaseRoot 'Il2cpp_Server'
          $il2cppClientRoot = Join-Path $releaseRoot 'Il2cpp_Client'
          $dockerRoot = Join-Path $releaseRoot 'Docker'

          Remove-Item $releaseRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path (Join-Path $serverRoot 'Mods') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $clientRoot 'Mods') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $il2cppServerRoot 'Mods') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $il2cppClientRoot 'Mods') -Force | Out-Null
          New-Item -ItemType Directory -Path $dockerRoot -Force | Out-Null

          Copy-Item 'bin/Mono_Server/netstandard2.1/DedicatedServerMod_Mono_Server.dll' (Join-Path $serverRoot 'Mods/DedicatedServerMod_Mono_Server.dll')
          Copy-Item 'bin/Mono_Client/netstandard2.1/DedicatedServerMod_Mono_Client.dll' (Join-Path $clientRoot 'Mods/DedicatedServerMod_Mono_Client.dll')
          Copy-Item 'bin/Il2cpp_Server/net6.0/DedicatedServerMod_Il2cpp_Server.dll' (Join-Path $il2cppServerRoot 'Mods/DedicatedServerMod_Il2cpp_Server.dll')
          Copy-Item 'bin/Il2cpp_Client/net6.0/DedicatedServerMod_Il2cpp_Client.dll' (Join-Path $il2cppClientRoot 'Mods/DedicatedServerMod_Il2cpp_Client.dll')
          Copy-Item 'packaging/Server/start_server.bat' (Join-Path $serverRoot 'start_server.bat')
          Copy-Item 'packaging/Server/start_server.bat' (Join-Path $il2cppServerRoot 'start_server.bat')
          Copy-Item 'Docker/Dockerfile' (Join-Path $dockerRoot 'Dockerfile')
          Copy-Item 'Docker/docker-compose.example.yml' (Join-Path $dockerRoot 'docker-compose.example.yml')
          Copy-Item 'Docker/run.sh' (Join-Path $dockerRoot 'run.sh')
          Copy-Item 'Docker/.dockerignore' (Join-Path $dockerRoot '.dockerignore')
          Copy-Item 'Docker/README.md' (Join-Path $dockerRoot 'README.md')
          Copy-Item 'bin/Mono_Server/netstandard2.1/DedicatedServerMod_Mono_Server.dll' (Join-Path $dockerRoot 'DedicatedServerMod_Mono_Server.dll')
          Copy-Item 'bin/Il2cpp_Server/net6.0/DedicatedServerMod_Il2cpp_Server.dll' (Join-Path $dockerRoot 'DedicatedServerMod_Il2cpp_Server.dll')

          Compress-Archive -Path (Join-Path $serverRoot '*') -DestinationPath (Join-Path $releaseRoot 'Mono-Server.zip') -Force
          Compress-Archive -Path (Join-Path $clientRoot '*') -DestinationPath (Join-Path $releaseRoot 'Mono-Client.zip') -Force
          Compress-Archive -Path (Join-Path $il2cppServerRoot '*') -DestinationPath (Join-Path $releaseRoot 'Il2cpp_Server.zip') -Force
          Compress-Archive -Path (Join-Path $il2cppClientRoot '*') -DestinationPath (Join-Path $releaseRoot 'Il2cpp_Client.zip') -Force
          Compress-Archive -Path (Get-ChildItem -Path $dockerRoot -Force | ForEach-Object { $_.FullName }) -DestinationPath (Join-Path $releaseRoot 'Docker.zip') -Force

      - name: Upload Docker Image Context
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-context
          path: release/Docker
          if-no-files-found: error

      - name: Generate Release Notes
        shell: pwsh
        run: |
          $version = '${{ needs.check-version.outputs.new-version }}'
          $lastTag = (git for-each-ref refs/tags --sort=-creatordate --format='%(refname:strip=2)' | Select-Object -First 1)

          if ($lastTag) {
            $commits = git log "$lastTag..HEAD" --pretty=format:"- %s (%h)" --no-merges
            $compareLine = "**Compare**: https://github.com/${{ github.repository }}/compare/$lastTag...v$version"
          } else {
            $commits = git log --pretty=format:"- %s (%h)" --no-merges -n 10
            $compareLine = "**Repository**: https://github.com/${{ github.repository }}/releases"
          }

          $commitLines = @($commits | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          if ($commitLines.Count -eq 0) {
            $commitText = "- Packaging-only release"
          } else {
            $commitText = [string]::Join("`n", $commitLines)
          }

          $releaseNotes = @(
            "## DedicatedServerMod v$version"
            ""
            "### Changes"
            ""
            $commitText
            ""
            $compareLine
          ) -join "`n"

          Set-Content 'release_notes.md' $releaseNotes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new-version }}
          name: ${{ needs.check-version.outputs.release-name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ needs.check-version.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.check-version.outputs.make_latest }}
          files: |
            release/Mono-Server.zip
            release/Mono-Client.zip
            release/Il2cpp_Server.zip
            release/Il2cpp_Client.zip
            release/Docker.zip

      - name: Summary
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "### Release Created Successfully"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "**Version:** v${{ needs.check-version.outputs.new-version }}"
          Add-Content $env:GITHUB_STEP_SUMMARY "**Prerelease:** ${{ needs.check-version.outputs.prerelease }}"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "**Artifacts:**"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Mono-Server.zip"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Mono-Client.zip"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Il2cpp_Server.zip"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Il2cpp_Client.zip"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Docker.zip"

  publish-docker-image:
    needs:
      - check-version
      - create-release
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download Docker Image Context
        uses: actions/download-artifact@v4
        with:
          name: docker-image-context
          path: docker-context

      - name: Compute Image Name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          repository_lower=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${repository_lower}" >> "$GITHUB_OUTPUT"

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ needs.check-version.outputs.new-version }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ needs.check-version.outputs.prerelease != 'true' }}

      - name: Build And Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
