name: Build and Deploy Documentation

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      assembly_branch:
        description: "Assembly branch to use (main/master or beta)"
        required: false
        default: "main"
        type: choice
        options:
          - main
          - master
          - beta

permissions:
  contents: read

concurrency:
  group: "docs-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout DedicatedServerMod
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine Assembly Branch
        id: assembly-branch
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ -n "${{ inputs.assembly_branch }}" ]]; then
            requested_branch="${{ inputs.assembly_branch }}"
          else
            requested_branch="master"
          fi

          case "$requested_branch" in
            main|master|beta)
              ;;
            *)
              echo "Unsupported assembly branch: $requested_branch"
              exit 1
              ;;
          esac

          if [[ "$requested_branch" == "beta" ]]; then
            game_branch="beta"
          else
            game_branch="main"
          fi

          echo "game_branch=$game_branch" >> "$GITHUB_OUTPUT"
          echo "Using Mono assemblies from $game_branch (requested: $requested_branch)"

      - name: Restore Mono Assembly Cache
        id: mono-cache
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: game-assemblies
          key: mono-assemblies-v1-${{ steps.assembly-branch.outputs.game_branch }}

      - name: Checkout Game Assemblies
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GAME_ASSEMBLIES_REPO }}
          token: ${{ secrets.GAME_ASSEMBLIES_TOKEN }}
          ref: ${{ steps.assembly-branch.outputs.game_branch }}
          path: game-assemblies
          fetch-depth: 1
        if: github.event_name != 'pull_request' || (steps.mono-cache.outputs.cache-hit != 'true' && github.event.pull_request.head.repo.full_name == github.repository)

      - name: Verify Assemblies
        shell: bash
        run: |
          test -f "game-assemblies/Managed/Assembly-CSharp.dll"
          test -f "game-assemblies/MelonLoader/MelonLoader.dll"

      - name: Save Mono Assembly Cache
        if: always() && github.event_name == 'pull_request' && steps.mono-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: game-assemblies
          key: mono-assemblies-v1-${{ steps.assembly-branch.outputs.game_branch }}

      - name: Create CI Build Properties
        shell: bash
        run: |
          cat > ci.build.props << 'EOF'
          <Project>
              <PropertyGroup>
                  <MonoAssembliesPath>$(MSBuildThisFileDirectory)game-assemblies/Managed</MonoAssembliesPath>
                  <MelonLoaderAssembliesPath>$(MSBuildThisFileDirectory)game-assemblies/MelonLoader</MelonLoaderAssembliesPath>
              </PropertyGroup>
          </Project>
          EOF

      - name: Restore Dependencies
        run: dotnet restore DedicatedServerMod.csproj

      - name: Build Documentation Assembly
        run: dotnet build DedicatedServerMod.csproj --no-restore -c Documentation -v normal

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build Documentation Site
        shell: bash
        run: |
          docfx docfx/docfx.json

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: docfx-site
          path: ./docfx/_site
        if: github.event_name != 'pull_request'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: docfx-site
          path: ./docfx/_site

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          attempts=5
          delay=15

          for attempt in $(seq 1 "$attempts"); do
            echo "Cloudflare Pages deploy attempt $attempt/$attempts"

            if bunx wrangler pages deploy ./docfx/_site --project-name=s1ds-docs --branch=master; then
              exit 0
            fi

            if [ "$attempt" -eq "$attempts" ]; then
              echo "Cloudflare Pages deploy failed after $attempts attempts."
              exit 1
            fi

            echo "Retrying in ${delay}s after transient deploy failure..."
            sleep "$delay"
            delay=$((delay * 2))
          done
