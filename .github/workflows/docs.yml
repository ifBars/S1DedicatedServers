name: Build and Deploy Documentation

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      assembly_branch:
        description: "Assembly branch to use (main/master or beta)"
        required: false
        default: "main"
        type: choice
        options:
          - main
          - master
          - beta

permissions:
  contents: read

concurrency:
  group: "docs-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout DedicatedServerMod
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine Assembly Branch
        id: assembly-branch
        shell: bash
        env:
          GAME_ASSEMBLIES_REPO: ${{ secrets.GAME_ASSEMBLIES_REPO }}
          GAME_ASSEMBLIES_TOKEN: ${{ secrets.GAME_ASSEMBLIES_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ -n "${{ inputs.assembly_branch }}" ]]; then
            requested_branch="${{ inputs.assembly_branch }}"
          else
            requested_branch="master"
          fi

          case "$requested_branch" in
            main|master|beta)
              ;;
            *)
              echo "Unsupported assembly branch: $requested_branch"
              exit 1
              ;;
          esac

          resolve_repo_branch() {
            local repo="$1"
            local token="$2"
            local requested="$3"
            local candidate_url="https://x-access-token:${token}@github.com/${repo}.git"

            if git ls-remote --exit-code --heads "$candidate_url" "$requested" >/dev/null 2>&1; then
              echo "$requested"
              return 0
            fi

            if [[ "$requested" == "master" ]] && git ls-remote --exit-code --heads "$candidate_url" main >/dev/null 2>&1; then
              echo "main"
              return 0
            fi

            if [[ "$requested" == "main" ]] && git ls-remote --exit-code --heads "$candidate_url" master >/dev/null 2>&1; then
              echo "master"
              return 0
            fi

            echo "Unable to resolve branch '$requested' for repository '$repo'" >&2
            return 1
          }

          game_branch=$(resolve_repo_branch "$GAME_ASSEMBLIES_REPO" "$GAME_ASSEMBLIES_TOKEN" "$requested_branch")
          echo "game_branch=$game_branch" >> "$GITHUB_OUTPUT"
          echo "Using Mono assemblies from $game_branch (requested: $requested_branch)"

      - name: Create Assembly Directory Structure
        shell: bash
        run: |
          mkdir -p ScheduleOneAssemblies/Managed
          mkdir -p ScheduleOneAssemblies/MelonLoader

      - name: Restore Game Assemblies from Cache
        id: cache-assemblies
        uses: actions/cache/restore@v4
        with:
          path: ScheduleOneAssemblies
          key: game-assemblies-docs-v6-${{ steps.assembly-branch.outputs.game_branch }}-${{ hashFiles('DedicatedServerMod.csproj') }}
          restore-keys: |
            game-assemblies-docs-v6-${{ steps.assembly-branch.outputs.game_branch }}-

      - name: Checkout Game Assemblies
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GAME_ASSEMBLIES_REPO }}
          token: ${{ secrets.GAME_ASSEMBLIES_TOKEN }}
          ref: ${{ steps.assembly-branch.outputs.game_branch }}
          path: game-assemblies
          fetch-depth: 1
        if: steps.cache-assemblies.outputs.cache-hit != 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)

      - name: Copy Game Assemblies
        shell: bash
        run: |
          if [ -d "game-assemblies/Managed" ]; then
            cp -r game-assemblies/Managed/* ScheduleOneAssemblies/Managed/ || echo "Failed to copy Mono assemblies"
          fi

          if [ -d "game-assemblies/MelonLoader" ]; then
            cp -r game-assemblies/MelonLoader/* ScheduleOneAssemblies/MelonLoader/ || echo "Failed to copy MelonLoader assemblies"
          fi
        if: steps.cache-assemblies.outputs.cache-hit != 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)

      - name: Check Assembly Files
        id: assembly-files
        shell: bash
        run: |
          ready=true

          if [ ! -f "ScheduleOneAssemblies/Managed/Assembly-CSharp.dll" ]; then
            echo "Missing Assembly-CSharp.dll"
            ready=false
          fi

          if [ ! -f "ScheduleOneAssemblies/MelonLoader/MelonLoader.dll" ]; then
            echo "Missing MelonLoader.dll"
            ready=false
          fi

          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Verify Assemblies
        shell: bash
        run: |
          test -f "ScheduleOneAssemblies/Managed/Assembly-CSharp.dll"
          test -f "ScheduleOneAssemblies/MelonLoader/MelonLoader.dll"

      - name: Create CI Build Properties
        shell: bash
        run: |
          cat > ci.build.props << 'EOF'
          <Project>
              <PropertyGroup>
                  <MonoAssembliesPath>$(MSBuildThisFileDirectory)ScheduleOneAssemblies/Managed</MonoAssembliesPath>
                  <MelonLoaderAssembliesPath>$(MSBuildThisFileDirectory)ScheduleOneAssemblies/MelonLoader</MelonLoaderAssembliesPath>
              </PropertyGroup>
          </Project>
          EOF

      - name: Restore Dependencies
        run: dotnet restore DedicatedServerMod.csproj

      - name: Build Documentation Assembly
        run: dotnet build DedicatedServerMod.csproj --no-restore -c Documentation -v normal

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build Documentation Site
        shell: bash
        run: |
          docfx docfx/docfx.json

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: docfx-site
          path: ./docfx/_site
        if: github.event_name != 'pull_request'

      - name: Save Game Assemblies to Cache
        uses: actions/cache/save@v4
        if: always() && steps.cache-assemblies.outputs.cache-hit != 'true' && steps.assembly-files.outputs.ready == 'true'
        with:
          path: ScheduleOneAssemblies
          key: game-assemblies-docs-v6-${{ steps.assembly-branch.outputs.game_branch }}-${{ hashFiles('DedicatedServerMod.csproj') }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: docfx-site
          path: ./docfx/_site

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          attempts=5
          delay=15

          for attempt in $(seq 1 "$attempts"); do
            echo "Cloudflare Pages deploy attempt $attempt/$attempts"

            if bunx wrangler pages deploy ./docfx/_site --project-name=s1ds-docs --branch=master; then
              exit 0
            fi

            if [ "$attempt" -eq "$attempts" ]; then
              echo "Cloudflare Pages deploy failed after $attempts attempts."
              exit 1
            fi

            echo "Retrying in ${delay}s after transient deploy failure..."
            sleep "$delay"
            delay=$((delay * 2))
          done
