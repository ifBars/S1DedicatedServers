name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      assembly_branch:
        description: "Assembly branch to use (main/master or beta)"
        required: false
        default: "main"
        type: choice
        options:
          - main
          - master
          - beta

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout DedicatedServerMod
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine Assembly Branch
        id: assembly-branch
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ -n "${{ inputs.assembly_branch }}" ]]; then
            requested_branch="${{ inputs.assembly_branch }}"
          else
            requested_branch="master"
          fi

          case "$requested_branch" in
            main|master|beta)
              ;;
            *)
              echo "Unsupported assembly branch: $requested_branch"
              exit 1
              ;;
          esac

          if [[ "$requested_branch" == "beta" ]]; then
            mono_branch="beta"
            il2cpp_branch="beta"
          else
            mono_branch="main"
            il2cpp_branch="main"
          fi

          echo "mono_branch=$mono_branch" >> "$GITHUB_OUTPUT"
          echo "il2cpp_branch=$il2cpp_branch" >> "$GITHUB_OUTPUT"
          echo "Using Mono assemblies from $mono_branch and IL2CPP assemblies from $il2cpp_branch (requested: $requested_branch)"

      - name: Restore Mono Assembly Cache
        id: mono-cache
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: game-assemblies
          key: mono-assemblies-v1-${{ steps.assembly-branch.outputs.mono_branch }}

      - name: Restore IL2CPP Assembly Cache
        id: il2cpp-cache
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: il2cpp-assemblies
          key: il2cpp-assemblies-v1-${{ steps.assembly-branch.outputs.il2cpp_branch }}

      - name: Checkout Mono Game Assemblies
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GAME_ASSEMBLIES_REPO }}
          token: ${{ secrets.GAME_ASSEMBLIES_TOKEN }}
          ref: ${{ steps.assembly-branch.outputs.mono_branch }}
          path: game-assemblies
          fetch-depth: 1
        if: github.event_name != 'pull_request' || (steps.mono-cache.outputs.cache-hit != 'true' && github.event.pull_request.head.repo.full_name == github.repository)

      - name: Checkout IL2CPP Game Assemblies
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.IL2CPP_ASSEMBLIES_REPO }}
          token: ${{ secrets.IL2CPP_ASSEMBLIES_TOKEN }}
          ref: ${{ steps.assembly-branch.outputs.il2cpp_branch }}
          path: il2cpp-assemblies
          fetch-depth: 1
        if: github.event_name != 'pull_request' || (steps.il2cpp-cache.outputs.cache-hit != 'true' && github.event.pull_request.head.repo.full_name == github.repository)

      - name: Verify Mono Assemblies
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "game-assemblies/Managed/Assembly-CSharp.dll" ]; then
            echo "Found Mono Assembly-CSharp.dll"
          else
            echo "Missing Mono Assembly-CSharp.dll"
            exit 1
          fi

          if [ -f "game-assemblies/MelonLoader/MelonLoader.dll" ]; then
            echo "Found Mono MelonLoader.dll"
          else
            echo "Missing Mono MelonLoader.dll"
            exit 1
          fi

      - name: Verify IL2CPP Assemblies
        shell: bash
        run: |
          set -euo pipefail

          il2cpp_assemblies_dir=""
          if [ -d "il2cpp-assemblies/MelonLoader/Il2CppAssemblies" ]; then
            il2cpp_assemblies_dir="il2cpp-assemblies/MelonLoader/Il2CppAssemblies"
          elif [ -d "il2cpp-assemblies/Il2CppAssemblies" ]; then
            il2cpp_assemblies_dir="il2cpp-assemblies/Il2CppAssemblies"
          fi

          il2cpp_net6_dir=""
          if [ -d "il2cpp-assemblies/MelonLoader/net6" ]; then
            il2cpp_net6_dir="il2cpp-assemblies/MelonLoader/net6"
          elif [ -d "il2cpp-assemblies/net6" ]; then
            il2cpp_net6_dir="il2cpp-assemblies/net6"
          fi

          if [ -z "$il2cpp_assemblies_dir" ]; then
            echo "IL2CPP assemblies directory not found in il2cpp-assemblies checkout"
            exit 1
          fi

          if [ -z "$il2cpp_net6_dir" ]; then
            echo "IL2CPP net6 directory not found in il2cpp-assemblies checkout"
            exit 1
          fi

          if [ -f "$il2cpp_assemblies_dir/Assembly-CSharp.dll" ]; then
            echo "Found IL2CPP Assembly-CSharp.dll"
          else
            echo "Missing IL2CPP Assembly-CSharp.dll"
            exit 1
          fi

          if [ -f "$il2cpp_net6_dir/MelonLoader.dll" ]; then
            echo "Found IL2CPP MelonLoader.dll"
          else
            echo "Missing IL2CPP MelonLoader.dll"
            exit 1
          fi

      - name: Save Mono Assembly Cache
        if: always() && github.event_name == 'pull_request' && steps.mono-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: game-assemblies
          key: mono-assemblies-v1-${{ steps.assembly-branch.outputs.mono_branch }}

      - name: Save IL2CPP Assembly Cache
        if: always() && github.event_name == 'pull_request' && steps.il2cpp-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: il2cpp-assemblies
          key: il2cpp-assemblies-v1-${{ steps.assembly-branch.outputs.il2cpp_branch }}

      - name: Create Mono CI Build Properties
        shell: bash
        run: |
          cat > ci.build.props << 'EOF'
          <Project>
              <PropertyGroup>
                  <AutomateLocalDeployment>false</AutomateLocalDeployment>
                  <MelonLoaderAssembliesPath>$(MSBuildThisFileDirectory)game-assemblies/MelonLoader</MelonLoaderAssembliesPath>
                  <MonoAssembliesPath>$(MSBuildThisFileDirectory)game-assemblies/Managed</MonoAssembliesPath>
              </PropertyGroup>
          </Project>
          EOF

      - name: Restore Mono Dependencies
        run: dotnet restore DedicatedServerMod.csproj -p:EffectiveConfiguration=Mono_Server

      - name: Build Mono Server
        run: dotnet build DedicatedServerMod.csproj --no-restore -c Mono_Server -v normal

      - name: Build Mono Client
        run: dotnet build DedicatedServerMod.csproj --no-restore -c Mono_Client -v normal

      - name: Create IL2CPP CI Build Properties
        shell: bash
        run: |
          cat > ci.build.props << 'EOF'
          <Project>
              <PropertyGroup>
                  <AutomateLocalDeployment>false</AutomateLocalDeployment>
                  <Il2CppGamePath>$(MSBuildThisFileDirectory)il2cpp-assemblies</Il2CppGamePath>
              </PropertyGroup>
          </Project>
          EOF

      - name: Disable Publicizer For IL2CPP
        shell: bash
        run: |
          cat > Directory.Build.targets << 'EOF'
          <Project>
              <ItemGroup Condition="'$(EffectiveConfiguration)'=='Il2cpp_Client' Or '$(EffectiveConfiguration)'=='Il2cpp_Server'">
                  <Publicize Remove="Assembly-CSharp" />
              </ItemGroup>
          </Project>
          EOF

      - name: Remove Mono Assembly Trees Before IL2CPP Build
        shell: bash
        run: |
          rm -rf game-assemblies ScheduleOneAssemblies

      - name: Reset IL2CPP Restore State
        shell: bash
        run: |
          rm -rf obj/Il2cpp_Server obj/Il2cpp_Client
          rm -f obj/project.assets.json obj/*.nuget.g.props obj/*.nuget.g.targets

      - name: Restore IL2CPP Dependencies
        run: dotnet restore DedicatedServerMod.csproj -p:EffectiveConfiguration=Il2cpp_Server

      - name: Build IL2CPP Server
        run: dotnet build DedicatedServerMod.csproj --no-restore -c Il2cpp_Server -v normal

      - name: Build IL2CPP Client
        run: dotnet build DedicatedServerMod.csproj --no-restore -c Il2cpp_Client -v normal

      - name: Remove Temporary IL2CPP Build Targets
        if: always()
        shell: bash
        run: rm -f Directory.Build.targets

      - name: Upload Mono Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DedicatedServerMod-Mono-Server
          path: bin/Mono_Server/netstandard2.1/*.dll

      - name: Upload Mono Client Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DedicatedServerMod-Mono-Client
          path: bin/Mono_Client/netstandard2.1/*.dll

      - name: Upload IL2CPP Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DedicatedServerMod-Il2cpp-Server
          path: bin/Il2cpp_Server/net6.0/*.dll

      - name: Upload IL2CPP Client Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DedicatedServerMod-Il2cpp-Client
          path: bin/Il2cpp_Client/net6.0/*.dll

  summary:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "=== Build Complete ==="
          echo "Mono Server: ${{ needs.build.result }}"
          echo "Mono Client: ${{ needs.build.result }}"
          echo "IL2CPP Server: ${{ needs.build.result }}"
          echo "IL2CPP Client: ${{ needs.build.result }}"
